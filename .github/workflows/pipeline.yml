name: Main Pipeline for Orchestrate

on:
  push:
    branches:
      - Main
  workflow_dispatch

jobs:
  verify:
    uses: ./.github/workflows/test_connrction.yml
    permissions:
      id-token: write
      contents: read

  test_fleet_health_envs:
    needs: verify_connection
    uses: ./.github/workflows/test_fleet_health.yml
    permissions:
      id-token: write
      contents: read

  smoke_testing:
    needs: test_fleet_health_aws
    uses: ./.github/workflows/smoke_test.yml
    permissions:
      id-token: write
      contents: read

  build_push:
    needs: smoke_testing
    uses: ./.github/workflows/build_push.yml
    permissions:
      id-token: write
      contents: read 

  deploy:
    needs: build_push
    uses: ./.github/workflows/deploy.yml 
    permissions:
      id-token: write
      contents: read   