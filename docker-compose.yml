services:
  simplebank_app:
    image: 865147227423.dkr.ecr.us-east-1.amazonaws.com/flaskapp-simple-bank:${IMAGE_TAG:-latest}
    container_name: simplebank_app
    ports:
      - "5000:5000"
    environment:
      - "FLASK_ENV=production"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl" , "-f" , "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s